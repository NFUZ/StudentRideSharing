name: Node.js CI

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install
      working-directory: Backend

    - name: Start server
      run: node server.js &
      working-directory: Backend

    - name: Test API
      run: |
        sleep 5
        curl http://localhost:3000